# Cluster Performance ML Configuration

# Data paths
data:
  raw_data_path: "data/raw/cluster_data.csv"
  processed_data_path: "data/processed/"
  
# Model settings
model:
  test_size: 0.2
  random_state: 42
  cross_validation_folds: 5
  
# Feature engineering
features:
  # Metadata features (inputs) - these will be auto-detected
  metadata_patterns:
    - clusterType
    - cluster_health_score
    - controlPlaneArch
    - infraNodeMemory
    - infraNodesCount
    - infraNodesType
    - infraNodevCPU
    - ipsecMode
    - jobConfig.burst
    - jobConfig.churnDelay
    - jobConfig.churnDeletionStrategy
    - jobConfig.churnDuration
    - jobConfig.churnPercent
    - jobConfig.cleanup
    - jobConfig.iterationsPerNamespace
    - jobConfig.jobIterations
    - jobConfig.jobType
    - jobConfig.maxWaitTimeout
    - jobConfig.metricsClosing
    - jobConfig.name
    - jobConfig.preLoadPeriod
    - jobConfig.qps
    - jobConfig.verifyObjects
    - jobConfig.waitForDeletion
    - jobConfig.waitWhenFinished
    - k8sVersion
    - masterNodeMemory
    - masterNodesCount
    - masterNodesType
    - masterNodevCPU
    - metricName
    - ocpMajorVersion
    - ocpVersion
    - passed
    - platform
    - podLatencyQuantilesMeasurement_Ready_P99
    - publish
    - region
    - sdnType
    - totalNodes
    - workerArch
    - workerNodeMemory
    - workerNodesCount
    - workerNodesType
    - workerNodevCPU

  # Target metrics (outputs) - these will be auto-detected
  metric_patterns:
    - cpu-kube-apiserver
    - cpu-masters
    - cpu-workers
    - max-memory-sum-kube-apiserver
    - max-memory-sum-masters
    - max-memory-sum-workers

# Models to train
models:
  - name: "RandomForest"
    type: "RandomForestRegressor"
    params:
      n_estimators: 100
      max_depth: 10
      random_state: 42
      n_jobs: -1
      
  - name: "XGBoost"
    type: "XGBRegressor"
    params:
      n_estimators: 100
      max_depth: 6
      learning_rate: 0.1
      random_state: 42
      n_jobs: -1
      
  - name: "LightGBM"
    type: "LGBMRegressor"
    params:
      n_estimators: 100
      max_depth: 6
      learning_rate: 0.1
      random_state: 42
      n_jobs: -1

# Evaluation metrics
evaluation:
  metrics:
    - mean_squared_error
    - mean_absolute_error
    - r2_score
    - explained_variance_score

# Output settings
output:
  model_save_path: "models/"
  results_save_path: "results/"
  plots_save_path: "results/plots/"
